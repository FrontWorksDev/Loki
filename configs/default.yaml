# Loki デフォルト設定
compress:
  quality: 0          # JPEG品質 (1-100)。0の場合はlevelに基づく
  level: "medium"     # 圧縮レベル (low/medium/high)
  output: ""          # 出力パス (空の場合は自動生成: {name}_compressed.{ext})
  recursive: false    # ディレクトリを再帰的に処理する

# APIサーバー設定
# 各値は環境変数 LOKI_API_* で上書き可能（ネストはアンダースコア区切り）。
# 例: LOKI_API_HOST, LOKI_API_PORT, LOKI_API_BODY_LIMIT_BYTES, LOKI_API_RATE_LIMIT_REQUESTS_PER_MINUTE
api:
  host: "0.0.0.0"             # リッスンアドレス。"127.0.0.1" でローカル限定、"::" でIPv6
  port: 8080
  cors:
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST", "OPTIONS"]
    allowed_headers: ["Content-Type", "Authorization"]
    allow_credentials: false
    max_age: 300
  body_limit_bytes: 33554432   # 32 MiB (Cloud Run HTTP/1 上限と整合させ、ローカルとデプロイで挙動差が出ないようにする)
  rate_limit:
    requests_per_minute: 30
    burst: 10
  logging:
    level: "info"              # debug/info/warn/error
