name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同時デプロイの抑止 (前ジョブ完了を待つ)
concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

env:
  GCP_REGION: asia-northeast1
  AR_REPO: loki
  SERVICE: loki-api
  IMAGE_NAME: api

permissions:
  contents: read
  id-token: write   # WIF (OIDC) 用

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE_URI" -t "${IMAGE_URI%:*}:latest" .
          docker push "$IMAGE_URI"
          docker push "${IMAGE_URI%:*}:latest"

      - name: Deploy to Cloud Run
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          CORS_ORIGINS: ${{ secrets.LOKI_CORS_ORIGINS }}
        run: |
          gcloud run deploy "${SERVICE}" \
            --image="${IMAGE_URI}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --concurrency=10 \
            --timeout=60s \
            --set-env-vars=LOKI_API_PORT=8080,LOKI_API_HOST=0.0.0.0,LOKI_API_LOGGING_LEVEL=info \
            --set-env-vars="^@@^LOKI_API_CORS_ALLOWED_ORIGINS=${CORS_ORIGINS}" \
            --quiet

      - name: Show service URL
        run: |
          SERVICE_URL=$(gcloud run services describe "${SERVICE}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)')
          echo "Deployed: ${SERVICE_URL}"
          echo "::notice title=Cloud Run::Service URL: ${SERVICE_URL}"
